<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E.H Car Multimarcas | Estoque Atualizado</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            /* Cores extraídas da Logo da E.H Car */
            --bg-header: #0d141e; /* Fundo escuro premium */
            --brand-blue-light: #00a2d3; /* Azul do texto "Multimarcas" */
            --brand-blue-dark: #00479b; /* Azul forte do contorno do carro */
            --primary: #1a1a1a;
            --accent: #25d366; /* Verde WhatsApp */
            --bg: #f0f2f5;
            --text: #333;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        
        body { background-color: var(--bg); color: var(--text); }

        /* HEADER PREMIUM E.H CAR */
        header {
            background: linear-gradient(135deg, var(--bg-header) 0%, #1a2536 100%);
            color: white;
            padding: 30px 20px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            border-bottom: 4px solid var(--brand-blue-light);
        }

        .logo-img {
            max-width: 220px; 
            height: auto;
            margin-bottom: 10px;
            border-radius: 8px; /* Adicionado um leve arredondamento caso a logo não seja vazada */
        }

        .header-subtitle {
            color: var(--brand-blue-light);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 700;
        }

        .container {
            padding: 30px 20px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 25px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .card {
            background: white; border-radius: 12px; overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.06); position: relative;
            display: flex; flex-direction: column;
            border-top: 3px solid transparent;
            transition: 0.3s;
        }

        .card:hover {
            border-top: 3px solid var(--brand-blue-light);
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        .main-img-container {
            width: 100%; aspect-ratio: 4/3; overflow: hidden;
            background-color: #e9e9e9; cursor: zoom-in;
        }

        .main-img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.3s ease; }
        .main-img-container:hover .main-img { transform: scale(1.03); }

        .gallery-thumbs { display: flex; gap: 8px; padding: 10px 15px 0; }
        .gallery-thumbs img {
            width: 60px; height: 45px; object-fit: cover; border-radius: 6px;
            cursor: zoom-in; border: 2px solid transparent; transition: 0.2s;
        }
        .gallery-thumbs img:hover { border-color: var(--brand-blue-light); opacity: 0.9; }

        .card-content { padding: 15px; display: flex; flex-direction: column; flex-grow: 1; }
        .card-title { font-size: 1.3rem; font-weight: 900; margin-bottom: 5px; color: var(--bg-header); }
        .card-info { color: #888; font-size: 0.85rem; margin-bottom: 10px; font-weight: 700; }
        .card-desc { font-size: 0.85rem; color: #555; margin-bottom: 15px; line-height: 1.5; flex-grow: 1; }
        .card-price { font-size: 1.6rem; font-weight: 900; color: var(--brand-blue-dark); margin-bottom: 15px; padding-top: 10px; border-top: 1px solid #eee; }

        .btn-whats {
            display: flex; align-items: center; justify-content: center; gap: 10px;
            background-color: var(--accent); color: white; padding: 14px;
            text-decoration: none; border-radius: 8px; font-weight: 700; transition: 0.2s;
        }
        .btn-whats:hover { background-color: #1fae51; }

        .status-badge {
            position: absolute; top: 12px; right: 12px; background: rgba(220, 38, 38, 0.9);
            color: white; padding: 6px 12px; border-radius: 20px; font-size: 0.85rem; font-weight: 700; z-index: 10;
        }

        .vendido { opacity: 0.75; }
        .vendido .btn-whats { background-color: #999; pointer-events: none; }
        .vendido .main-img { filter: grayscale(1); }
        .vendido .main-img-container { cursor: default; }

        footer { text-align: center; padding: 40px 20px; color: #999; font-size: 0.8rem; }

        /* ======== BOTÃO WHATSAPP FLUTUANTE ======== */
        .btn-flutuante {
            position: fixed;
            bottom: 25px;
            right: 25px;
            background-color: var(--accent);
            color: white;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(37, 211, 102, 0.4);
            z-index: 1000;
            transition: transform 0.3s ease;
        }
        .btn-flutuante:hover { transform: scale(1.1); }
        .btn-flutuante svg { width: 35px; height: 35px; fill: white; }

        /* MODAL NATIVO */
        .modal-overlay {
            display: none; position: fixed; z-index: 9999; left: 0; top: 0;
            width: 100%; height: 100%; background-color: rgba(0,0,0,0.9); backdrop-filter: blur(5px);
        }
        .modal-content {
            margin: auto; display: block; max-width: 95%; max-height: 90vh;
            position: relative; top: 50%; transform: translateY(-50%);
            object-fit: contain; border-radius: 8px;
        }
        .fechar-modal {
            position: absolute; top: 15px; right: 25px; color: #fff;
            font-size: 40px; font-weight: bold; cursor: pointer; z-index: 10000;
        }
    </style>
</head>
<body>

    <header>
        <img src="https://i.ibb.co/XfhQ6K1W/427844313-1115249769521415-8958427798152706443-n.jpg" alt="E.H Car Multimarcas" class="logo-img">
        <p class="header-subtitle">Confira nosso estoque atualizado</p>
    </header>

    <div class="container" id="estoque">
        <p style="text-align:center; width:100%; padding: 40px;">Carregando carros do sistema...</p>
    </div>

    <footer>
        &copy; 2024 E.H Car - Desenvolvido por Rocket
    </footer>

    <a href="https://wa.me/5511999999999?text=Olá! Vim pelo site e gostaria de um atendimento." target="_blank" class="btn-flutuante" title="Fale conosco no WhatsApp">
        <svg viewBox="0 0 24 24">
            <path d="M12.031 6.172c-3.181 0-5.767 2.586-5.768 5.766-.001 1.298.38 2.27 1.019 3.287l-.582 2.128 2.182-.573c.978.58 1.911.928 3.145.929 3.178 0 5.767-2.587 5.768-5.766.001-3.187-2.575-5.77-5.764-5.771zm3.392 8.244c-.144.405-.837.774-1.17.824-.299.045-.677.063-1.092-.069-.252-.08-.575-.187-.988-.365-1.739-.751-2.874-2.502-2.961-2.617-.087-.116-.708-.94-.708-1.793s.448-1.273.607-1.446c.159-.173.346-.217.462-.217l.332.006c.106.005.249-.04.39.298.144.347.491 1.2.534 1.287.043.087.072.188.014.304-.058.116-.087.188-.173.289l-.26.304c-.087.086-.177.18-.076.354.101.174.449.741.964 1.201.662.591 1.221.774 1.394.86s.274.072.376-.043c.101-.116.433-.506.549-.68.116-.173.231-.145.39-.087s1.011.477 1.184.564.289.13.332.202c.045.072.045.419-.099.824zm-3.423-14.416c-6.627 0-12 5.373-12 12s5.373 12 12 12 12-5.373 12-12-5.373-12-12-12zm.029 18.88c-1.161 0-2.305-.292-3.318-.844l-3.677.964.984-3.595c-.607-1.052-.927-2.246-.926-3.468.001-3.825 3.113-6.937 6.937-6.937 3.825 0 6.938 3.112 6.938 6.937 0 3.825-3.113 6.938-6.938 6.938z"/>
        </svg>
    </a>

    <div id="janelaModal" class="modal-overlay" onclick="fecharModal(event)">
        <span class="fechar-modal" onclick="fecharModal(event)">&times;</span>
        <img class="modal-content" id="imgNoModal">
    </div>

    <script>
        const public_url = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSbLdAMBR8kRzXX9e8SqLwBgbMoVbKM9sJ2wePogZrXByFs3R8KzBb6VY2u7ST1A_H5FpljpPy-vD9g/pub?gid=0&single=true&output=csv' + '&nocache=' + new Date().getTime();

        function abrirModal(srcImg) {
            document.getElementById('imgNoModal').src = srcImg;
            document.getElementById('janelaModal').style.display = "block";
            document.body.style.overflow = "hidden";
        }

        function fecharModal(event) {
            if(event.target.id === 'janelaModal' || event.target.className === 'fechar-modal') {
                document.getElementById('janelaModal').style.display = "none";
                document.body.style.overflow = "auto";
            }
        }

        function carregarEstoque() {
            Papa.parse(public_url, {
                download: true,
                header: true,
                complete: function(results) {
                    const dados = results.data;
                    const container = document.getElementById('estoque');
                    container.innerHTML = ''; 

                    dados.forEach((carro) => {
                        const modelo = carro.Modelo || carro['Modelo '] || carro['modelo'];
                        if(!modelo) return; 

                        const preco = carro.Preco || carro.Preço || 'Sob Consulta';
                        const status = carro.Status || carro['Status '] || 'Disponível';
                        const ano = carro.Ano || carro['Ano '] || '';
                        const descricao = carro.Descricao || carro['Descricao '] || carro['Descrição'] || '';
                        const foto1 = carro.Foto || carro['Foto '] || '';
                        const foto2 = carro.Foto2 || carro['Foto2 '] || '';
                        const foto3 = carro.Foto3 || carro['Foto3 '] || '';

                        const isVendido = status.toLowerCase().trim() === 'vendido';
                        const fotosValidas = [foto1, foto2, foto3].filter(url => url);

                        if(fotosValidas.length === 0) return; 

                        let miniaturasHtml = '';
                        if(fotosValidas.length > 1) {
                            miniaturasHtml = `<div class="gallery-thumbs">`;
                            fotosValidas.forEach((url) => {
                                miniaturasHtml += `<img src="${url}" onclick="abrirModal('${url}')">`;
                            });
                            miniaturasHtml += `</div>`;
                        }
                        
                        const card = `
                            <div class="card ${isVendido ? 'vendido' : ''}">
                                ${isVendido ? '<div class="status-badge">Vendido</div>' : ''}
                                <div class="main-img-container" onclick="${isVendido ? '' : `abrirModal('${foto1}')`}">
                                    <img src="${foto1}" class="main-img" alt="${modelo}">
                                </div>
                                ${miniaturasHtml}
                                <div class="card-content">
                                    <div class="card-title">${modelo}</div>
                                    <div class="card-info">${ano}</div>
                                    ${descricao ? `<div class="card-desc">${descricao}</div>` : ''}
                                    <div class="card-price">${preco}</div>
                                    <a href="https://wa.me/5511999999999?text=Olá, tenho interesse no ${modelo} anunciado." target="_blank" class="btn-whats">
                                        <svg width="20" height="20" fill="currentColor" viewBox="0 0 24 24"><path d="M12.031 6.172c-3.181 0-5.767 2.586-5.768 5.766-.001 1.298.38 2.27 1.019 3.287l-.582 2.128 2.182-.573c.978.58 1.911.928 3.145.929 3.178 0 5.767-2.587 5.768-5.766.001-3.187-2.575-5.77-5.764-5.771zm3.392 8.244c-.144.405-.837.774-1.17.824-.299.045-.677.063-1.092-.069-.252-.08-.575-.187-.988-.365-1.739-.751-2.874-2.502-2.961-2.617-.087-.116-.708-.94-.708-1.793s.448-1.273.607-1.446c.159-.173.346-.217.462-.217l.332.006c.106.005.249-.04.39.298.144.347.491 1.2.534 1.287.043.087.072.188.014.304-.058.116-.087.188-.173.289l-.26.304c-.087.086-.177.18-.076.354.101.174.449.741.964 1.201.662.591 1.221.774 1.394.86s.274.072.376-.043c.101-.116.433-.506.549-.68.116-.173.231-.145.39-.087s1.011.477 1.184.564.289.13.332.202c.045.072.045.419-.099.824zm-3.423-14.416c-6.627 0-12 5.373-12 12s5.373 12 12 12 12-5.373 12-12-5.373-12-12-12zm.029 18.88c-1.161 0-2.305-.292-3.318-.844l-3.677.964.984-3.595c-.607-1.052-.927-2.246-.926-3.468.001-3.825 3.113-6.937 6.937-6.937 3.825 0 6.938 3.112 6.938 6.937 0 3.825-3.113 6.938-6.938 6.938z"/></svg>
                                        Tenho Interesse
                                    </a>
                                </div>
                            </div>
                        `;
                        container.innerHTML += card;
                    });
                }
            });
        }

        window.onload = carregarEstoque;
    </script>
</body>
</html>
